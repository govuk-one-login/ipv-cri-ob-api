name: PR check

on: pull_request
permissions: {}

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Run pre-commit
    runs-on: ubuntu-latest
    # concurrency:
    # group: pre-commit-${{ github.head_ref || github.ref_name }}
    # cancel-in-progress: true
    steps:
      - name: Run pre-commit
        uses: govuk-one-login/github-actions/code-quality/run-pre-commit@7915556fc28d7299972796de8b5888e04e05687a # my branch - change once merged
        with:
          all-files: true
          install-dependencies: 'true'
          node-version-file: '.nvmrc'

  unit-tests:
    name: Run unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # this can be condensed with the shared action
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: ./.github/actions/node-setup

      - name: Unit tests
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 1

  sonar:
    name: Sonar scan
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      # actions: read
    steps:
      - name: Run Sonar scan
        uses: govuk-one-login/github-actions/code-quality/sonarcloud@9d6ee027d0b9167dfc25e67124951956278bb585
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sonar-token: ${{ secrets.SONAR_TOKEN }}

  codeql:
    name: CodeQL scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Run CodeQL scan
        uses: govuk-one-login/github-actions/code-quality/codeql@f5362528578198e7851e96e0594f593beff0162e

  # pact test placeholder

  # infra test placholder

  deploy-preview:
    name: Deploy preview stack
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-preview.yml
    secrets:
      role_arn: ${{ secrets.DEV_GHA_ROLE_ARN }}
      bucket_name: ${{ secrets.TEMP_PREVIEW_BUCKET_ARN }}
    # do I need the outputs here

  api-tests:
    name: Run pre-merge api tests
    permissions:
      id-token: write
      contents: read
    needs: deploy-preview
    timeout-minutes: 15
    runs-on: ubuntu-latest
    # environment: development

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: ./.github/actions/node-setup

      - name: Assume AWS Role
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.DEV_GHA_ROLE_ARN }}
          aws-region: ${{ needs.deploy-preview.outputs.aws-region }}

      - name: Run tests
        env:
          STACK_NAME: ${{ needs.deploy-preview.outputs.stack-name }}
          AWS_REGION: ${{ needs.deploy-preview.outputs.aws-region }}
        run: |
          API_GATEWAY_ID_PRIVATE=$(aws cloudformation describe-stacks --stack-name $STACK_NAME | jq -r '.Stacks[].Outputs[] | select(.OutputKey == "PrivateApiGatewayId").OutputValue')
          API_GATEWAY_ID_PUBLIC=$(aws cloudformation describe-stacks --stack-name $STACK_NAME | jq -r '.Stacks[].Outputs[] | select(.OutputKey == "PublicApiGatewayId").OutputValue')
          export API_GATEWAY_ID_PRIVATE=$API_GATEWAY_ID_PRIVATE
          export API_GATEWAY_ID_PUBLIC=$API_GATEWAY_ID_PUBLIC
          npm run test:api

  # will need to add pact, infra, and smoke tests
  # sonar and codeql not in fe
  merge-status:
    name: Merge status
    runs-on: ubuntu-latest
    needs:
      - pre-commit
      - unit-tests
      - sonar
      - codeql
      - api-tests
    if: always()
    steps:
      - run: |
          failed=()
          [[ "${{ needs.pre-commit.result }}" != "success" ]] && failed+=("pre-commit")
          [[ "${{ needs.unit-tests.result }}" != "success" ]] && failed+=("unit-tests")
          [[ "${{ needs.sonar.result }}" != "success" ]] && failed+=("sonar")
          [[ "${{ needs.codeql.result }}" != "success" ]] && failed+=("codeql")
          [[ "${{ needs.api-tests.result }}" != "success" ]] && failed+=("api-tests")
          if [[ ${#failed[@]} -gt 0 ]]; then
            echo "The following jobs failed: ${failed[*]}"
            exit 1
          fi
