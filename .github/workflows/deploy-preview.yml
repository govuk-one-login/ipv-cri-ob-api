name: Deploy preview

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      role_arn:
        required: true
    outputs:
      stack-name:
        value: ${{ jobs.deploy-preview.outputs.stack-name }}
      aws-region:
        value: ${{ jobs.deploy-preview.outputs.aws-region}}
      # sha-short:
      #   value: ${{ jobs.build-preview.outputs.sha-short }}

permissions: {}

jobs:
  build-preview:
    name: Build app
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    # concurrency:
    #   group: build-development-${{ github.head_ref || github.ref_name }}
    outputs:
      sha-short: ${{ steps.get-sha.outputs.sha-short }}
    steps:
      - name: Get short SHA
        id: get-sha
        run: echo "sha-short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build app
        # uses: govuk-one-login/github-actions/sam/build-application@b2f2c762e88ff7b5656d87c733c57871997e350f
        uses: govuk-one-login/github-actions/sam/build-serverless-application@24304059124dff39f9c5c837e1c25b8d2500a903
        with:
          template: deploy/template.yaml
          cache-name: ipv-cri-ob-api-${{ steps.get-sha.outputs.sha-short }}
          role-to-assume-arn: ${{ secrets.role_arn }}
          pull-repository: true

  deploy-preview:
    name: Deploy stack
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      # contents: read
    timeout-minutes: 15
    needs: build-preview
    # concurrency:
    #   group: deploy-development-${{ github.head_ref || github.ref_name }}
    # environment: development
    outputs:
      aws-region: ${{ steps.deploy-preview.outputs.aws-region }}
      stack-name: ${{ steps.deploy-preview.outputs.stack-name }}
    steps:
      - name: Deploy stack
        uses: govuk-one-login/github-actions/sam/deploy-stack@a069a5f73bbfeea0e71901cee95c441f018e83cb
        id: deploy
        with:
          aws-role-arn: ${{ secrets.role_arn }}
          s3-prefix: preview
          sam-deployment-bucket: ${{ secrets.DEPLOYMENT_ARTIFACTS_BUCKET }}
          stack-name: preview-${{ needs.build-preview.outputs.sha-short}}
          cache-name: ipv-cri-ob-api-${{ needs.build-preview.outputs.sha-short}}
          delete-failed-stack: true
          # do we want disable rollback? I reckon so...

          tags: |
            cri:component=ipv-cri-ob-api
            cri:stack-type=preview
            cri:application=Lime
            cri:deployment-source=github-actions
          # parameters: |
          #   DeploymentType=pre-merge-integration
          #   ParameterPrefix=${{ secrets.PREMERGE_PARAMETER_PREFIX_STACK_NAME }}
          #   Environment=dev
          #   CommonStackName=passport-common-cri-api-local

          #   ParameterPrefix=ob-cri-api
          #   Environment=dev or local dev?
          #   CommonStackName=ob-common-cri-api-local
          #   DeploymentType=pre-merge-integration
