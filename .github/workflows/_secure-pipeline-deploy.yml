  deploy:
    name: Deploy stack
    runs-on: ubuntu-latest
    needs: test-images-build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # - name: Setup SAM
      #   uses: aws-actions/setup-sam@d78e1a4a9656d3b223e59b80676a797f20093133 # v2
      #     with:

      - name: SAM validate
        run: sam validate --region ${{ env.AWS_REGION }} -t deploy/template.yaml --lint

      - name: SAM build
        run: |
          mkdir out
          sam build -t deploy/template.yaml -b out/

      - name: SAM Deploy
        # assumes AWS role
        uses: govuk-one-login/devplatform-upload-action@v3.13.0
        with:
          aws-role-arn: ${{ secrets.role_arn}}
          aws-region: ${{ env.AWS_REGION }}
          artifact-bucket-name: ${{ secrets.artifact_bucket_name }}
          signing-profile-name: ${{ secrets.signing_profile }}
          working-directory: ./out
