name: Build and deploy

on:
  workflow_call:
    secrets:
      role_arn:
        required: true
      artifact_bucket_name:
        required: true
      ecr_repository_test:
        required: true
      ecr_repository_traffic_test:
        required: true
      container_sign_kms_key:
        required: true
      signing_profile:
        required: true
      environment:
        required: true
      # dynatrace_paas_token:
      #   required: true

